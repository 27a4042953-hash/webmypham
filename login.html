<main class="flex-grow flex flex-col md:flex-row min-h-screen">

<div class="w-full max-w-md">
<div class="text-center mb-12 mt-16 md:mt-0">
<h1 class="font-headline-lg text-headline-lg mb-4 text-on-surface">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your exclusive benefits.</p>
</div>
<!-- Form Toggle (Visual only for layout purposes) -->
<div class="flex border-b border-surface-variant mb-8">
<button class="flex-1 pb-4 text-center font-cta text-cta uppercase border-b-2 border-primary-container text-primary-container transition-colors duration-300">Sign In</button>
<button class="flex-1 pb-4 text-center font-cta text-cta uppercase text-on-surface-variant hover:text-on-surface transition-colors duration-300">Create Account</button>
</div>
<form class="space-y-6">
<div class="relative">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase mb-2" for="email">Email Address</label>
<input class="w-full border-0 border-b border-surface-variant bg-transparent px-0 py-2 focus:ring-0 focus:border-on-surface transition-colors font-body-md text-body-md text-on-surface placeholder-tertiary-fixed-dim" id="email" name="email" placeholder="Enter your email" type="email"/>
</div>
<div class="relative">
<div class="flex justify-between items-end mb-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<input class="w-full border-0 border-b border-surface-variant bg-transparent px-0 py-2 focus:ring-0 focus:border-on-surface transition-colors font-body-md text-body-md text-on-surface placeholder-tertiary-fixed-dim" id="password" name="password" placeholder="Enter your password" type="password"/>
</div>
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary font-cta text-cta uppercase tracking-widest py-4 px-8 hover:bg-opacity-90 transition-all duration-300 ease-out shadow-[0_10px_30px_rgba(0,0,0,0.05)]" type="submit">
